<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cadillacs & Dinosaurs - Ultra Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000814;
  font-family:Arial;
  color:white;
  text-align:center;
}

.header{
  background:#001d3d;
  padding:12px;
  font-size:20px;
  font-weight:bold;
}

#game{
  width:100%;
  max-width:900px;
  height:520px;
  margin:auto;
  background:black;
}

/* Control Panel */
.controls{
  margin-top:10px;
  padding-bottom:20px;
}

.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.btn{
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:18px;
  font-weight:bold;
  color:white;
  background:#003566;
}

.btn:active{
  background:#ff5400;
}

.big{
  width:80px;
  height:80px;
  font-size:22px;
}

.fullscreen{
  background:#38b000;
  border-radius:12px;
  width:140px;
  height:45px;
}
</style>
</head>

<body>

<div class="header">🎮 Cadillacs & Dinosaurs - ULTRA</div>

<div id="game"></div>

<div class="controls">

  <!-- Movement -->
  <div class="row">
    <button class="btn" ontouchstart="press('arrowleft')" ontouchend="release('arrowleft')">◀</button>
    <button class="btn" ontouchstart="press('arrowup')" ontouchend="release('arrowup')">▲</button>
    <button class="btn" ontouchstart="press('arrowdown')" ontouchend="release('arrowdown')">▼</button>
    <button class="btn" ontouchstart="press('arrowright')" ontouchend="release('arrowright')">▶</button>
  </div>

  <!-- Action Buttons -->
  <div class="row">
    <button class="btn big" ontouchstart="press('z')" ontouchend="release('z')">A</button>
    <button class="btn big" ontouchstart="press('x')" ontouchend="release('x')">B</button>
    <button class="btn big" ontouchstart="press('c')" ontouchend="release('c')">C</button>
  </div>

  <!-- System -->
  <div class="row">
    <button class="btn" onclick="coin()">COIN</button>
    <button class="btn" onclick="start()">START</button>
    <button class="btn fullscreen" onclick="goFull()">FULLSCREEN</button>
  </div>

</div>

<script>
EJS_player = "#game";
EJS_core = "arcade";
EJS_gameUrl = "./dino.zip"; // তোমার ROM নাম
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
function press(key){
  if(EJS_emulator) EJS_emulator.gameManager.pressKey(key);
}

function release(key){
  if(EJS_emulator) EJS_emulator.gameManager.releaseKey(key);
}

function coin(){
  press("shift");
  setTimeout(()=>release("shift"),200);
}

function start(){
  press("enter");
  setTimeout(()=>release("enter"),200);
}

function goFull(){
  let el=document.getElementById("game");
  if(el.requestFullscreen) el.requestFullscreen();
}
</script>

</body>
</html>
