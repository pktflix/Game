<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PKT Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#020617;
  font-family:Arial;
  color:white;
}

/* header */
.header{
  background:#020617;
  padding:16px;
  font-size:24px;
  font-weight:bold;
  border-bottom:1px solid #1e293b;
}

/* player */
.player-wrap{
  padding:10px;
}

#game{
  width:100%;
  max-width:900px;
  height:520px;
  margin:auto;
  background:black;
}

/* rows */
.row{
  margin:20px 0;
}

.row-title{
  padding:0 15px;
  font-size:18px;
  margin-bottom:10px;
}

/* horizontal scroll */
.game-row{
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:0 15px;
}

.card{
  min-width:160px;
  height:90px;
  background:#1e293b;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:0.25s;
}

.card:hover{
  transform:scale(1.08);
  background:#334155;
}
</style>
</head>

<body>

<div class="header">🎮 PKT Arcade</div>

<div class="player-wrap">
  <div id="game"></div>
</div>

<!-- ACTION ROW -->
<div class="row">
  <div class="row-title">🔥 Popular Games</div>
  <div class="game-row">

    <div class="card" onclick="loadGame('dino.zip','arcade')">
      Cadillacs & Dinosaurs
    </div>

    <div class="card" onclick="loadGame('kof97.zip','neogeo')">
      KOF 97
    </div>

    <div class="card" onclick="loadGame('metal_slug.zip','neogeo')">
      Metal Slug
    </div>

  </div>
</div>

<!-- FIGHTING ROW -->
<div class="row">
  <div class="row-title">🥊 Fighting Games</div>
  <div class="game-row">

    <div class="card" onclick="loadGame('kof97.zip','neogeo')">
      King of Fighters 97
    </div>

    <div class="card" onclick="loadGame('dino.zip','arcade')">
      Cadillacs & Dinosaurs
    </div>

  </div>
</div>

<script>
let emulatorLoaded = false;

function loadGame(rom, core){

  document.getElementById("game").innerHTML = "";

  window.EJS_player = "#game";
  window.EJS_core = core;
  window.EJS_gameUrl = "./" + rom;
  window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

  if(!emulatorLoaded){
    let script = document.createElement("script");
    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
    document.body.appendChild(script);
    emulatorLoaded = true;
  } else {
    EJS_emulator = null;
    let script = document.createElement("script");
    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
    document.body.appendChild(script);
  }
}
</script>

</body>
</html>
