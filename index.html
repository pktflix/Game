<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PKT Premium Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#020617;
  font-family:Arial;
  color:white;
}

/* header */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

/* search */
.search{
  padding:8px 12px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
  width:180px;
}

/* hero */
.hero{
  height:180px;
  background:linear-gradient(90deg,#001d3d,#000814);
  display:flex;
  align-items:center;
  padding-left:20px;
  font-size:26px;
  font-weight:bold;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
  gap:18px;
  padding:20px;
}

.card{
  background:#0f172a;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 0 0 rgba(0,0,0,0);
}

.card:hover{
  transform:translateY(-6px) scale(1.04);
  box-shadow:0 10px 25px rgba(0,0,0,.6);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.title{
  padding:10px;
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🎮 PKT Arcade</div>
  <input class="search" placeholder="Search game..." onkeyup="searchGame(this.value)">
</div>

<div class="hero">
🔥 Play Classic Arcade Games Online
</div>

<div class="grid" id="gameGrid">

  <div class="card" data-name="dino" onclick="openGame('dino.zip','arcade')">
    <img src="https://coolrom.com.au/screenshots_original/mame/Cadillacs and Dinosaurs (2).jpg">
    <div class="title">Cadillacs & Dinosaurs</div>
  </div>

  <div class="card" data-name="kof97" onclick="openGame('neobombe_2.zip','neogeo')">
    <img src="https://www.myabandonware.com/media/screenshots/n/neo-bomberman-16mq/neo-bomberman_1.png">
    <div class="title">Bomber Man</div>
  </div>

  <div class="card" data-name="metal slug" onclick="openGame('metal_slug.zip','neogeo')">
    <img src="images/metal_slug.jpg">
    <div class="title">Metal Slug</div>
  </div>

</div>

<script>
function openGame(rom, core){
  window.open("play.html?rom="+rom+"&core="+core,"_blank");
}

function searchGame(q){
  q = q.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
      card.dataset.name.includes(q) ? "block" : "none";
  });
}
</script>

</body>
</html>
